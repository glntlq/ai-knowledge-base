# 每日自动采集知识库（UTC 08:00 = 北京时间 16:00），并可选手动触发。
name: Daily Knowledge Collect

on:
  schedule:
    # 每天 UTC 08:00
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-collect-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run knowledge pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GitHub Search API（可选，提高限流额度；与仓库 GITHUB_TOKEN 同名时由脚本读取）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 若未设置 RSS_URLS，流水线会从 pipeline/rss_sources.yaml 读取 enabled 源
          RSS_URLS: ${{ secrets.RSS_URLS }}
        # 使用模块方式运行，避免脚本路径下相对导入问题；与本地 `python pipeline/pipeline.py` 等价（已修复 path）
        run: python -m pipeline.pipeline --sources github,rss --limit 20 --verbose

      - name: Validate articles (schema)
        run: python hooks/validate_json.py "knowledge/articles/*.json"

      - name: Check article quality
        run: python hooks/check_quality.py "knowledge/articles/*.json"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add knowledge/articles knowledge/raw
          if [ -f knowledge/articles_index.json ]; then
            git add knowledge/articles_index.json
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit; skipping push."
            exit 0
          fi

          ARTICLE_COUNT="$(git diff --staged --name-only -- 'knowledge/articles/*.json' 2>/dev/null | wc -l | tr -d ' ')"
          DATE_UTC="$(date -u +%Y-%m-%d)"

          git commit -m "chore: daily collect ${DATE_UTC} (${ARTICLE_COUNT} articles)"
          git push
